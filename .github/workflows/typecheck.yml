name: Type check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: typecheck-${{ github.ref }}
  cancel-in-progress: true

env:
  REPORTS_DIR: .reports

jobs:
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v4.2.0
        with:
          enable-cache: true

      - run: uv sync --frozen --dev

      - name: Prepare reports directory
        run: mkdir -p "${REPORTS_DIR}/typecheck"

      - name: ty check
        run: |
          set -o pipefail
          uv run ty check 2>&1 | tee "${REPORTS_DIR}/typecheck/ty.log"

      - name: Upload ty log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: typecheck-log
          path: .reports/typecheck/
          retention-days: 14
