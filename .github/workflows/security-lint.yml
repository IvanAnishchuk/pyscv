name: Security lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: security-lint-${{ github.ref }}
  cancel-in-progress: true

env:
  REPORTS_DIR: .reports

jobs:
  security-lint:
    name: Security lint (S rules)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v4.2.0
        with:
          enable-cache: true

      - run: uv sync --frozen --dev

      - name: Prepare reports directory
        run: mkdir -p "${REPORTS_DIR}/security-lint"

      - name: Ruff security-only scan (SARIF)
        run: |
          uv run ruff check \
            --select S,BLE,TRY \
            --output-format=sarif \
            --output-file="${REPORTS_DIR}/security-lint/ruff-security.sarif" \
            src/ \
            || true

      - name: Ruff security-only scan (JSON)
        run: |
          uv run ruff check \
            --select S,BLE,TRY \
            --output-format=json \
            --output-file="${REPORTS_DIR}/security-lint/ruff-security.json" \
            src/ \
            || true

      - name: Ruff security-only scan (text log)
        run: |
          uv run ruff check \
            --select S,BLE,TRY \
            --output-format=full \
            src/ 2>&1 | tee "${REPORTS_DIR}/security-lint/ruff-security.log" || true

      - name: Write security summary
        if: always()
        run: |
          {
            echo "## Security lint report"
            echo ""
            if [ ! -f "${REPORTS_DIR}/security-lint/ruff-security.json" ]; then
              echo "**ruff S/BLE/TRY**: scanner did not produce output -- check logs"
            elif [ -s "${REPORTS_DIR}/security-lint/ruff-security.json" ]; then
              count=$(jq 'length' "${REPORTS_DIR}/security-lint/ruff-security.json")
              if [ "$count" = "0" ]; then
                echo "**ruff S/BLE/TRY**: clean"
              else
                by_code=$(jq -r 'sort_by(.code) | group_by(.code) | map("\(.[0].code): \(length)") | join(", ")' "${REPORTS_DIR}/security-lint/ruff-security.json")
                echo "**ruff S/BLE/TRY**: **$count** finding(s)"
                echo ""
                echo "Breakdown: $by_code"
              fi
            else
              echo "**ruff S/BLE/TRY**: clean"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload security SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v3.27.5
        with:
          sarif_file: .reports/security-lint/ruff-security.sarif
          category: ruff-security

      - name: Upload security lint logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: security-lint-logs
          path: .reports/security-lint/
          retention-days: 30

      - name: Fail if scanner did not produce output
        run: |
          if [ ! -f "${REPORTS_DIR}/security-lint/ruff-security.sarif" ]; then
            echo "Security scanner failed to produce SARIF -- ruff may have crashed."
            exit 1
          fi
