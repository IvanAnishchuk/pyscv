name: OSV scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: osv-scan-${{ github.ref }}
  cancel-in-progress: true

env:
  REPORTS_DIR: .reports

jobs:
  osv-scan:
    name: OSV scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Prepare reports directory
        run: mkdir -p "${REPORTS_DIR}/osv"

      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --output=.reports/osv/osv-results.sarif
            --format=sarif
            --recursive
            ./
        continue-on-error: true

      - name: Upload OSV SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v3.27.5
        with:
          sarif_file: .reports/osv/osv-results.sarif
          category: osv-scanner

      - name: Upload OSV report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: osv-scan-report
          path: .reports/osv/
          retention-days: 30
